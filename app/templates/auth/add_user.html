{% extends "base/layout.html" %}
{% block title %}إضافة مستخدم{% endblock %}
{% block page_title %}إضافة مستخدم جديد{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-person-plus"></i> إضافة مستخدم جديد</h4>
    <a href="/admin/users" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> رجوع</a>
</div>

<div class="form-card" style="max-width: 500px;">
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/users/add">
        <div class="mb-3">
            <label class="form-label">الاسم الكامل <span class="required-star">*</span></label>
            <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">اسم المستخدم <span class="required-star">*</span></label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">كلمة المرور <span class="required-star">*</span></label>
            <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
            <label class="form-label">الدور <span class="required-star">*</span></label>
            <select name="role" class="form-select" required>
                <option value="supervisor">مشرف</option>
                <option value="admin">مدير</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> حفظ</button>
    </form>
</div>
{% endblock %}
