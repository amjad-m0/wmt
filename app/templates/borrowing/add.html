{% extends "base/layout.html" %}
{% block title %}استلاف / تسليف جديد{% endblock %}
{% block page_title %}استلاف / تسليف جديد{% endblock %}
{% block content %}

<div class="page-header">
    <h4><i class="bi bi-arrow-left-right"></i> استلاف / تسليف جديد</h4>
    <a href="/borrowings/" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> رجوع</a>
</div>

<div class="form-card" style="max-width: 700px;">
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="post" action="/borrowings/add">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">نوع العملية <span class="required-star">*</span></label>
                <select name="borrow_kind" class="form-select" id="borrowKind" required>
                    <option value="internal">استلاف داخلي (من أمر عمل تاني عندنا)</option>
                    <option value="from_contractor">استلاف من مقاول خارجي</option>
                    <option value="to_contractor">تسليف لمقاول خارجي</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">أمر العمل المرتبط <span class="required-star">*</span></label>
                <select name="borrowing_order_id" class="form-select" required>
                    <option value="">اختر...</option>
                    {% for o in orders %}
                    <option value="{{ o.id }}">{{ o.order_number }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6" id="sourceOrderField">
                <label class="form-label">أمر العمل المصدر <span class="required-star">*</span></label>
                <select name="source_order_id" class="form-select" id="sourceOrderSelect">
                    <option value="">اختر...</option>
                    {% for o in orders %}
                    <option value="{{ o.id }}">{{ o.order_number }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6" id="contractorField" style="display:none;">
                <label class="form-label">اسم المقاول <span class="required-star">*</span></label>
                <input type="text" name="contractor_name" id="contractorInput" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">المادة <span class="required-star">*</span></label>
                <select name="material_id" class="form-select" required>
                    <option value="">اختر...</option>
                    {% for m in materials %}
                    <option value="{{ m.id }}">{{ m.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">الكمية <span class="required-star">*</span></label>
                <input type="number" step="0.01" name="quantity" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">المشرف المسجِّل</label>
                <input type="text" class="form-control" value="{{ current_user.full_name }}" disabled>
                <div class="form-text">بيتسجل تلقائي باسم المستخدم اللي مسجل دخول دلوقتي.</div>
            </div>
            <div class="col-12">
                <label class="form-label">ملاحظات</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4"><i class="bi bi-check-lg"></i> تأكيد</button>
    </form>
</div>

<script>
function updateBorrowForm() {
    const kind = document.getElementById('borrowKind').value;
    const sourceOrderField = document.getElementById('sourceOrderField');
    const sourceOrderSelect = document.getElementById('sourceOrderSelect');
    const contractorField = document.getElementById('contractorField');
    const contractorInput = document.getElementById('contractorInput');

    if (kind === 'internal') {
        sourceOrderField.style.display = 'block';
        sourceOrderSelect.required = true;
        contractorField.style.display = 'none';
        contractorInput.required = false;
        contractorInput.value = '';
    } else {
        sourceOrderField.style.display = 'none';
        sourceOrderSelect.required = false;
        sourceOrderSelect.value = '';
        contractorField.style.display = 'block';
        contractorInput.required = true;
    }
}
document.getElementById('borrowKind').addEventListener('change', updateBorrowForm);
updateBorrowForm();
</script>
{% endblock %}
