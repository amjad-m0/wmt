{% extends "base/layout.html" %}
{% block title %}تسجيل الدخول - نظام إدارة المستودع{% endblock %}
{% block auth_content %}
<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <i class="bi bi-box-seam"></i>
            <h4>نظام إدارة المستودع</h4>
            <p class="text-muted small">سجّل الدخول للمتابعة</p>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">
                <i class="bi bi-box-arrow-in-left"></i> دخول
            </button>
        </form>
    </div>
</div>
<style>
.login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a4a7a 0%, #1F5C99 100%);
    padding: 20px;
}
.login-box {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.login-header { text-align: center; margin-bottom: 24px; }
.login-header i { font-size: 2.5rem; color: #1F5C99; }
.login-header h4 { margin-top: 8px; font-weight: 700; color: #1a1a2e; }
</style>
{% endblock %}
